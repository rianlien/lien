<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>色で表すなら？</title>
<link rel="stylesheet" href="/style.css" />
<style>
  /* reply.htmlは1カラムの単独ページなので、side用レイアウトは使わない */
  body { flex-direction: column; }
  .reply-canvas-wrap {
    position: relative;
    width: min(50vw, 46vh);
    aspect-ratio: 2 / 3;
  }
  .reply-canvas-wrap canvas {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 6px;
    box-shadow: 0 6px 28px rgba(60,50,30,0.14);
    background: #f2ead6;
  }
  .reply-error {
    font-size: 14px;
    color: #a05a3a;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="reply-pane" id="pane">
    <div class="reply-question">読み込み中…</div>
  </div>

<script src="/mesh-render.js"></script>
<script>
(function () {
  "use strict";

  var params = new URLSearchParams(location.search);
  var sessionId = params.get("s");
  var participantId = params.get("p");
  var pane = document.getElementById("pane");

  function renderError(message) {
    pane.innerHTML = "";
    var div = document.createElement("div");
    div.className = "reply-error";
    div.textContent = message;
    pane.appendChild(div);
  }

  // ポストカードは自分の色×発起人の色の2点グラデーションにする（発起人の位置や他の友達の情報は渡ってこない）。
  // 自分の色を上、発起人の色を下に置き、その間で混ざり合う見た目にする。
  function appendPostcard(participant, hintText) {
    var canvasWrap = document.createElement("div");
    canvasWrap.className = "reply-canvas-wrap";
    var canvas = document.createElement("canvas");
    canvas.width = 560;
    canvas.height = 840;
    canvasWrap.appendChild(canvas);
    pane.appendChild(canvasWrap);

    var points = [{ id: participantId, x: 0.5, y: 0.28, color: participant.color, reach: 0.42 }];
    if (participant.initiatorColor) {
      points.push({ id: participantId + "-initiator", x: 0.5, y: 0.72, color: participant.initiatorColor, reach: 0.42 });
    }
    MeshRender.render(canvas, points, "perceptual");

    var doneHint = document.createElement("div");
    doneHint.className = "reply-done-hint";
    doneHint.textContent = hintText;
    pane.appendChild(doneHint);
  }

  // 完成版アート（発起人＋全友達の色が混ざった最終Mesh Gradient）。完成後、回答済みの友達にのみ渡る
  // （serializeForRespondentがrespondedAt済みの場合のみfinalArtDataUrlを含めるため、ここでは
  // 存在チェックだけでよい）。
  function appendFinalArt(participant) {
    var heading = document.createElement("div");
    heading.className = "reply-question";
    heading.style.fontSize = "16px";
    heading.textContent = "完成版アート";
    pane.appendChild(heading);

    var canvasWrap = document.createElement("div");
    canvasWrap.className = "reply-canvas-wrap";
    var img = document.createElement("img");
    img.src = participant.finalArtDataUrl;
    img.alt = "完成版アート";
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.display = "block";
    img.style.borderRadius = "6px";
    img.style.boxShadow = "0 6px 28px rgba(60,50,30,0.14)";
    canvasWrap.appendChild(img);
    pane.appendChild(canvasWrap);

    var download = document.createElement("a");
    download.className = "reply-download";
    download.href = participant.finalArtDataUrl;
    download.setAttribute("download", "color-gradient-" + sessionId + ".png");
    download.textContent = "ダウンロード";
    pane.appendChild(download);
  }

  // 送信済みの参加者には、色を選び直す手段を一切見せない（やり直し不可はUI側でも徹底する）
  function renderAlreadyResponded(participant) {
    pane.innerHTML = "";
    var question = document.createElement("div");
    question.className = "reply-question";
    question.textContent = "回答ありがとう。";
    pane.appendChild(question);
    appendPostcard(participant, "この色は送信済み。もう選び直すことはできない。");
    if (participant.finalArtDataUrl) {
      appendFinalArt(participant);
    }
  }

  // 未回答のまま「完成」により締め切られた枠。エラーではなく、締め切られたことが伝わる表示にする
  // （UXライティングの最終文言は今後の課題。ここでは最小限の文言で機能を満たす）。
  function renderClosed() {
    pane.innerHTML = "";
    var question = document.createElement("div");
    question.className = "reply-question";
    question.textContent = "この招待は締め切られました。";
    pane.appendChild(question);
    var hint = document.createElement("div");
    hint.className = "reply-done-hint";
    hint.textContent = "回答の受付は終了している。";
    pane.appendChild(hint);
  }

  // 参加者の最新状態から、表示すべき画面を出し分ける（回答済み／締め切り／回答フォーム）
  function renderParticipantState(participant) {
    if (participant.respondedAt) {
      renderAlreadyResponded(participant);
      return;
    }
    if (participant.completedAt) {
      renderClosed();
      return;
    }
    renderForm(participant);
  }

  // 「絵の具パレット」— アプリの世界観（インク・絵の具をスケッチブックへ）に合わせて選んだ6色。
  // ネイティブのinput[type=color]だけに任せず、まず直感的にここから選べるようにする
  // （「その他の色」リンクから、これまで通り自由な色選択にも逃がす）。
  var INK_PALETTE = ["#c85a54", "#d9a441", "#6b8f5a", "#4a7a8f", "#6a5a9e", "#4a4640"];

  function renderForm(participant) {
    pane.innerHTML = "";

    var eyebrow = document.createElement("div");
    eyebrow.className = "reply-eyebrow";
    eyebrow.textContent = "INVITED";
    pane.appendChild(eyebrow);

    var question = document.createElement("div");
    question.className = "reply-question";
    question.textContent = "私を色で表すなら？";
    pane.appendChild(question);

    var hint = document.createElement("div");
    hint.className = "reply-done-hint";
    hint.textContent = "理由や説明はいらない。直感で選んでください。送信すると選び直せない。";
    pane.appendChild(hint);

    var selectedColor = INK_PALETTE[0];

    var preview = document.createElement("div");
    preview.className = "reply-preview";
    preview.style.background = selectedColor;
    pane.appendChild(preview);

    var palette = document.createElement("div");
    palette.className = "ink-palette";
    pane.appendChild(palette);

    var swatchButtons = [];
    function selectColor(color) {
      selectedColor = color;
      preview.style.background = color;
      swatchButtons.forEach(function (btn) {
        btn.classList.toggle("selected", btn.dataset.color.toLowerCase() === color.toLowerCase());
      });
    }

    INK_PALETTE.forEach(function (color, i) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "ink-swatch" + (i === 0 ? " selected" : "");
      btn.style.background = color;
      btn.style.color = color; // .selectedのcurrentColorリング用
      btn.dataset.color = color;
      btn.setAttribute("aria-label", "この色を選ぶ");
      btn.addEventListener("click", function () { selectColor(color); });
      swatchButtons.push(btn);
      palette.appendChild(btn);
    });

    var customRow = document.createElement("div");
    customRow.className = "reply-custom-row";
    pane.appendChild(customRow);

    var customLink = document.createElement("button");
    customLink.type = "button";
    customLink.className = "reply-custom-link";
    customLink.textContent = "この6色にない色を選ぶ";
    customRow.appendChild(customLink);

    var picker = document.createElement("input");
    picker.type = "color";
    picker.className = "reply-picker";
    picker.value = selectedColor;
    picker.style.display = "none";
    customRow.appendChild(picker);

    customLink.addEventListener("click", function () {
      picker.style.display = "";
      customLink.style.display = "none";
      picker.click();
    });
    picker.addEventListener("input", function () {
      swatchButtons.forEach(function (btn) { btn.classList.remove("selected"); });
      selectColor(picker.value);
    });

    var submit = document.createElement("button");
    submit.className = "reply-submit";
    submit.textContent = "送信する";
    pane.appendChild(submit);

    submit.addEventListener("click", function () {
      submit.disabled = true;
      fetch("/api/sessions/" + encodeURIComponent(sessionId) + "/participants/" + encodeURIComponent(participantId), {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ color: selectedColor, confirm: true })
      })
        .then(function (r) {
          return r.json().then(function (body) { return { ok: r.ok, body: body }; });
        })
        .then(function (result) {
          if (result.ok) {
            renderParticipantState(result.body);
            return;
          }
          // 409（既に回答済み／送信の直前にセッションが「完成」して締め切られた等）。
          // エラーボディのparticipantで最新状態を出し分ける。
          if (result.body && result.body.participant) {
            renderParticipantState(result.body.participant);
          } else {
            submit.disabled = false;
          }
        })
        .catch(function () {
          submit.disabled = false;
        });
    });
  }

  if (!sessionId || !participantId) {
    renderError("招待リンクが正しくない。URLを確認してください。");
    return;
  }

  fetch("/api/sessions/" + encodeURIComponent(sessionId) + "/participants/" + encodeURIComponent(participantId))
    .then(function (r) {
      if (!r.ok) throw new Error("not found");
      return r.json();
    })
    .then(renderParticipantState)
    .catch(function () {
      renderError("このリンクは見つからなかった。発行し直してもらってください。");
    });
})();
</script>
</body>
</html>
