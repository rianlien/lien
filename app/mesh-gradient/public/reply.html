<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>色で表すなら？</title>
<link rel="stylesheet" href="/style.css" />
<style>
  /* reply.htmlは1カラムの単独ページなので、side用レイアウトは使わない */
  body { flex-direction: column; }
  .reply-canvas-wrap {
    position: relative;
    width: min(50vw, 46vh);
    aspect-ratio: 2 / 3;
  }
  .reply-canvas-wrap canvas {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 6px;
    box-shadow: 0 6px 28px rgba(60,50,30,0.14);
    background: #f2ead6;
  }
  .reply-error {
    font-size: 14px;
    color: #a05a3a;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="reply-pane" id="pane">
    <div class="reply-question">読み込み中…</div>
  </div>

<script src="/mesh-render.js"></script>
<script>
(function () {
  "use strict";

  var params = new URLSearchParams(location.search);
  var sessionId = params.get("s");
  var participantId = params.get("p");
  var pane = document.getElementById("pane");

  function renderError(message) {
    pane.innerHTML = "";
    var div = document.createElement("div");
    div.className = "reply-error";
    div.textContent = message;
    pane.appendChild(div);
  }

  function appendPostcard(color, hintText) {
    var canvasWrap = document.createElement("div");
    canvasWrap.className = "reply-canvas-wrap";
    var canvas = document.createElement("canvas");
    canvas.width = 560;
    canvas.height = 840;
    canvasWrap.appendChild(canvas);
    pane.appendChild(canvasWrap);
    MeshRender.render(canvas, [{ id: participantId, x: 0.5, y: 0.38, color: color, reach: 0.55 }], "perceptual");

    var doneHint = document.createElement("div");
    doneHint.className = "reply-done-hint";
    doneHint.textContent = hintText;
    pane.appendChild(doneHint);
  }

  // 送信済みの参加者には、色を選び直す手段を一切見せない（やり直し不可はUI側でも徹底する）
  function renderAlreadyResponded(participant) {
    pane.innerHTML = "";
    var question = document.createElement("div");
    question.className = "reply-question";
    question.textContent = "回答ありがとう。";
    pane.appendChild(question);
    appendPostcard(participant.color, "この色は送信済み。もう選び直すことはできない。");
  }

  function renderForm(participant) {
    if (participant.respondedAt) {
      renderAlreadyResponded(participant);
      return;
    }

    pane.innerHTML = "";

    var question = document.createElement("div");
    question.className = "reply-question";
    question.textContent = "私を色で表すなら？";
    pane.appendChild(question);

    var hint = document.createElement("div");
    hint.className = "reply-done-hint";
    hint.textContent = "理由や説明はいらない。直感で選んでください。送信すると選び直せない。";
    pane.appendChild(hint);

    var picker = document.createElement("input");
    picker.type = "color";
    picker.className = "reply-picker";
    picker.value = "#e8546a";
    pane.appendChild(picker);

    var submit = document.createElement("button");
    submit.className = "reply-submit";
    submit.textContent = "送信する";
    pane.appendChild(submit);

    submit.addEventListener("click", function () {
      submit.disabled = true;
      fetch("/api/sessions/" + encodeURIComponent(sessionId) + "/participants/" + encodeURIComponent(participantId), {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ color: picker.value })
      })
        .then(function (r) { return r.json(); })
        .then(function (updated) {
          renderAlreadyResponded(updated);
        })
        .catch(function () {
          submit.disabled = false;
        });
    });
  }

  if (!sessionId || !participantId) {
    renderError("招待リンクが正しくない。URLを確認してください。");
    return;
  }

  fetch("/api/sessions/" + encodeURIComponent(sessionId) + "/participants/" + encodeURIComponent(participantId))
    .then(function (r) {
      if (!r.ok) throw new Error("not found");
      return r.json();
    })
    .then(renderForm)
    .catch(function () {
      renderError("このリンクは見つからなかった。発行し直してもらってください。");
    });
})();
</script>
</body>
</html>
