<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>色グラデーションアプリ — Mesh Gradient 試作</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="canvas-pane">
    <div class="canvas-wrap">
      <canvas id="canvas" width="560" height="840"></canvas>
      <div class="overlay" id="overlay"></div>
    </div>
  </div>
  <div class="side">
    <h1>Mesh Gradient 試作</h1>
    <div class="hint">
      自分の位置を決めたら色を選び、友達を追加して招待リンクを発行する。友達がリンクを開いて色を選ぶと、
      このページに自動で反映される（数秒おきに確認）。友達には自分の位置・他の友達の色は一切見せない。
      ポストカード比率（2:3）のキャンバスに、絵の具/インクをスケッチブックへ垂らしたようなモーフグラデーションを描く。
      井戸（色を置いた点）はどれだけ混ざり合ってもよい設計。
    </div>
    <div class="instruction" id="instruction"></div>
    <div class="mode-toggle">
      <button id="modeNaive">naive平均</button>
      <button id="modePerceptual" class="active">知覚補正</button>
    </div>
    <div id="pointList"></div>
    <button class="add-btn" id="addPoint">+ 友達を追加</button>
    <button class="complete-btn" id="completeBtn">完成する</button>
    <div class="completed-panel" id="completedPanel" style="display:none;">
      <div class="completed-label">完成済み。これ以上の追加・変更はできない。</div>
      <a class="download-btn" id="downloadLink">完成版アートをダウンロード</a>
    </div>
  </div>

<script src="/mesh-render.js"></script>
<script>
(function () {
  "use strict";

  var LS_SESSION = "meshgrad_session_id";
  var LS_SELF = "meshgrad_self_id";

  // ---- state ----
  var sessionId = localStorage.getItem(LS_SESSION);
  var selfId = localStorage.getItem(LS_SELF);
  var points = []; // サーバーのparticipantsをそのまま反映するローカルミラー
  var blendMode = "perceptual"; // "naive" | "perceptual"
  var nextFriendNum = 1;

  // flow:
  //  - "placing-self":       自分の位置をキャンバス上で決める段階（セッション未作成）
  //  - "awaiting-self-color": 自分の位置は決めたが、自分の色をまだ選んでいない段階
  //  - "idle":                通常操作（友達追加・ドラッグ・色/影響範囲の調整）
  //  - "placing-friend":      新しい友達の位置をキャンバス上で決める段階
  var flow = sessionId ? "idle" : "placing-self";
  var pendingSelf = null; // awaiting-self-color の間だけ使う
  var dragging = null;
  var pollTimer = null;
  var completed = false; // 発起人が「完成」を確定したか（session.completedAt の有無）
  var finalArtDataUrl = null;

  var canvas = document.getElementById("canvas");
  var overlay = document.getElementById("overlay");
  var instructionEl = document.getElementById("instruction");
  var addBtn = document.getElementById("addPoint");
  var listEl = document.getElementById("pointList");
  var completeBtn = document.getElementById("completeBtn");
  var completedPanel = document.getElementById("completedPanel");
  var downloadLink = document.getElementById("downloadLink");

  function render() {
    MeshRender.render(canvas, points, blendMode);
    updateOverlay();
  }

  function updateOverlay() {
    overlay.innerHTML = "";
    if (flow === "awaiting-self-color" && pendingSelf) {
      var marker = document.createElement("div");
      marker.className = "pending-marker";
      marker.style.left = (pendingSelf.x * 100) + "%";
      marker.style.top = (pendingSelf.y * 100) + "%";
      overlay.appendChild(marker);
    }
  }

  // 完成後は、以後のUI状態を一律「完成済み」表示に固定する（addBtn等の個別disabled指定より優先）
  function applyCompletedState() {
    completeBtn.style.display = completed ? "none" : "";
    completedPanel.style.display = completed && finalArtDataUrl ? "" : "none";
    if (completed && finalArtDataUrl) {
      downloadLink.href = finalArtDataUrl;
      downloadLink.setAttribute("download", "color-gradient-" + sessionId + ".png");
    }
    if (completed) {
      addBtn.disabled = true;
    }
  }

  function updateInstruction() {
    if (completed) {
      instructionEl.textContent = "完成済み。これ以上友達を追加したり、色・位置・影響範囲を変更したりはできない。";
      canvas.classList.remove("placing");
      addBtn.disabled = true;
      return;
    }
    var text;
    if (flow === "placing-self") {
      text = "① キャンバスをクリックして、自分の位置を決めてください。";
    } else if (flow === "awaiting-self-color") {
      text = "② 自分を表す色を選んでください（下の点滅しているスワッチをクリック）。色・影響範囲は「決定する」を押すまで何度でも選び直せます。決まったら「決定する」を押してください。";
    } else if (flow === "placing-friend") {
      text = "③ キャンバスをクリックして、友達の位置を決めてください。";
    } else {
      text = "「+ 友達を追加」から友達を配置し、発行された招待リンクを送りましょう。";
    }
    instructionEl.textContent = text;
    canvas.classList.toggle("placing", flow === "placing-self" || flow === "placing-friend");
    addBtn.disabled = flow !== "idle";
  }

  // ---- API ----
  function apiPost(path, body) {
    return fetch(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) })
      .then(function (r) { return r.json(); });
  }
  function apiPatch(path, body) {
    return fetch(path, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) })
      .then(function (r) { return r.json(); });
  }
  function apiGet(path) {
    return fetch(path).then(function (r) { return r.json(); });
  }

  function inviteUrl(participantId) {
    return location.origin + "/reply.html?s=" + encodeURIComponent(sessionId) + "&p=" + encodeURIComponent(participantId);
  }

  // サーバーに拒否された操作（完成による凍結・既に確定済み等）の後、ローカル状態をサーバーの実際の値に
  // 合わせ直す。楽観更新した後にエラーが分かった場合の巻き戻し先として使う。
  function resyncFromServer() {
    return apiGet("/api/sessions/" + sessionId).then(function (res) {
      if (!res || !res.participants) return;
      points = res.participants;
      if (res.completedAt) {
        completed = true;
        finalArtDataUrl = res.finalArtDataUrl || finalArtDataUrl;
        updateInstruction();
        applyCompletedState();
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      }
      renderList();
      render();
    });
  }

  // ---- キャンバス座標変換 ----
  function canvasPosToUnit(clientX, clientY) {
    var rect = canvas.getBoundingClientRect();
    return {
      x: Math.min(1, Math.max(0, (clientX - rect.left) / rect.width)),
      y: Math.min(1, Math.max(0, (clientY - rect.top) / rect.height))
    };
  }

  // ---- 配置 ----
  function placeSelf(u) {
    apiPost("/api/sessions", { x: u.x, y: u.y, label: "自分" }).then(function (res) {
      sessionId = res.sessionId;
      selfId = res.selfId;
      localStorage.setItem(LS_SESSION, sessionId);
      localStorage.setItem(LS_SELF, selfId);
      var selfPoint = { id: selfId, label: "自分", x: u.x, y: u.y, color: null, reach: MeshRender.DEFAULT_REACH, isSelf: true, respondedAt: null };
      points = [selfPoint];
      pendingSelf = selfPoint;
      flow = "awaiting-self-color";
      updateInstruction();
      renderList();
      render();
      startPolling();
      var input = document.getElementById("color-" + selfId);
      if (input) { try { input.click(); } catch (e) { /* 手動クリックの導線は残っている */ } }
    });
  }

  function placeFriend(u) {
    var label = "友達" + nextFriendNum;
    apiPost("/api/sessions/" + sessionId + "/participants", { x: u.x, y: u.y, label: label }).then(function (res) {
      flow = "idle";
      updateInstruction();
      if (!res || !res.participantId) {
        // セッションが完成済み等でサーバーに拒否された。ローカルに偽の参加者を追加せず、実際の状態に合わせ直す
        resyncFromServer();
        return;
      }
      nextFriendNum++;
      points.push({
        id: res.participantId, label: label, x: u.x, y: u.y,
        color: null, reach: MeshRender.DEFAULT_REACH, isSelf: false, respondedAt: null
      });
      renderList();
      render();
    });
  }

  // ---- ポーリング（友達の回答を自動反映） ----
  function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(function () {
      if (!sessionId || dragging) return;
      apiGet("/api/sessions/" + sessionId).then(function (res) {
        if (dragging) return; // 応答が返ってくるまでの間にドラッグが始まった場合は上書きしない
        if (!res || !res.participants) return; // サーバー側でセッションが読めない場合は何もせず次回に任せる
        points = res.participants;
        if (res.completedAt) {
          // 完成後はセッションが二度と変化しないため、以後のポーリング（完成版アート込みの再取得）を止める
          completed = true;
          finalArtDataUrl = res.finalArtDataUrl || finalArtDataUrl;
          updateInstruction();
          applyCompletedState();
          clearInterval(pollTimer);
          pollTimer = null;
        }
        if (flow === "idle" || flow === "awaiting-self-color") {
          renderList();
          render();
        }
      });
    }, 3000);
  }

  // ---- UI: 一覧 ----
  function renderList() {
    listEl.innerHTML = "";
    points.forEach(function (p) {
      // 「完成」後は、参加者個別のrespondedAtの有無に関わらず、発起人自身も含めて全員が一律ロックされる
      // （セッション全体のスナップショット確定のため。lib/participants.jsのpatchParticipantと対応）。
      var locked = completed || !!p.respondedAt;
      var row = document.createElement("div");
      row.className = "point-row" + (p.isSelf && !p.respondedAt && !completed ? " pending" : "")
        + (!p.isSelf && p.respondedAt ? " responded" : "")
        + (!p.isSelf && !p.respondedAt && completed ? " closed" : "");

      if (p.isSelf && !locked) {
        // 決定するまでは、色を選んだ後でも何度でも選び直せる（confirmを伴わないPATCHはロックしない）
        var colorInput = document.createElement("input");
        colorInput.type = "color";
        colorInput.id = "color-" + p.id;
        colorInput.value = p.color || "#888888";
        colorInput.addEventListener("input", function () {
          p.color = colorInput.value;
          render();
        });
        colorInput.addEventListener("change", function () {
          apiPatch("/api/sessions/" + sessionId + "/participants/" + p.id, { color: colorInput.value }).then(function () {
            renderList();
            render();
          });
        });
        row.appendChild(colorInput);
      } else if (p.isSelf) {
        // 自分も、決定した後は発起人自身も含めてロック対象（色を見てから調整するバイアスを防ぐため）
        var selfSwatch = document.createElement("div");
        selfSwatch.style.width = "32px";
        selfSwatch.style.height = "32px";
        selfSwatch.style.borderRadius = "6px";
        selfSwatch.style.background = p.color;
        row.appendChild(selfSwatch);
      } else {
        var swatch = document.createElement("div");
        swatch.style.width = "32px";
        swatch.style.height = "32px";
        swatch.style.borderRadius = "6px";
        swatch.style.background = p.color || "#e7e2d4";
        swatch.style.border = p.color ? "none" : "1px dashed #d9d2bf";
        row.appendChild(swatch);
      }

      var labelInput = document.createElement("input");
      labelInput.type = "text";
      labelInput.value = p.label;
      labelInput.disabled = locked;
      labelInput.addEventListener("input", function () { p.label = labelInput.value; });
      labelInput.addEventListener("change", function () {
        apiPatch("/api/sessions/" + sessionId + "/participants/" + p.id, { label: labelInput.value });
      });
      row.appendChild(labelInput);

      var posSpan = document.createElement("span");
      posSpan.className = "pos";
      if (p.isSelf) {
        posSpan.textContent = !p.color ? "色を選択中…" : (locked ? "自分" : "決定してください");
      } else {
        posSpan.textContent = p.respondedAt ? "回答済み" : (completed ? "締め切り済み（未回答）" : "招待リンク未回答");
      }
      row.appendChild(posSpan);

      if (p.isSelf && p.color && !locked) {
        // 色・影響範囲を選んだ後、明示的にこのボタンを押すまでは何度でも調整できる
        var confirmBtn = document.createElement("button");
        confirmBtn.textContent = "決定する";
        confirmBtn.style.fontSize = "11px";
        confirmBtn.style.padding = "4px 10px";
        confirmBtn.style.borderRadius = "6px";
        confirmBtn.style.border = "1px solid #4a4af0";
        confirmBtn.style.background = "#4a4af0";
        confirmBtn.style.color = "#fff";
        confirmBtn.style.cursor = "pointer";
        confirmBtn.addEventListener("click", function () {
          apiPatch("/api/sessions/" + sessionId + "/participants/" + p.id, { confirm: true }).then(function (res) {
            if (!res || res.error) {
              // セッションが完成済み等でサーバーに拒否された。respondedAtは立っていないので、実際の状態に合わせ直す
              resyncFromServer();
              return;
            }
            if (flow === "awaiting-self-color") {
              pendingSelf = null;
              flow = "idle";
              updateInstruction();
            }
            renderList();
            render();
          });
        });
        row.appendChild(confirmBtn);
      }

      if (p.isSelf) {
        var tag = document.createElement("span");
        tag.className = "self-marker";
        tag.textContent = "★";
        row.appendChild(tag);
      } else if (!completed) {
        var removeBtn = document.createElement("button");
        removeBtn.className = "remove";
        removeBtn.textContent = "×";
        removeBtn.addEventListener("click", function () {
          fetch("/api/sessions/" + sessionId + "/participants/" + p.id, { method: "DELETE" })
            .then(function (r) { return r.json().then(function (body) { return { ok: r.ok, body: body }; }); })
            .then(function (result) {
              if (!result.ok) {
                // セッションが完成済み等でサーバーに拒否された。ローカルから消さず、実際の状態に合わせ直す
                resyncFromServer();
                return;
              }
              points = points.filter(function (pt) { return pt.id !== p.id; });
              renderList();
              render();
            });
        });
        row.appendChild(removeBtn);
      }
      listEl.appendChild(row);

      if (!p.isSelf) {
        var inviteRow = document.createElement("div");
        inviteRow.className = "invite-row";
        var urlInput = document.createElement("input");
        urlInput.type = "text";
        urlInput.readOnly = true;
        urlInput.value = inviteUrl(p.id);
        var copyBtn = document.createElement("button");
        copyBtn.textContent = "コピー";
        copyBtn.addEventListener("click", function () {
          navigator.clipboard.writeText(urlInput.value).then(function () {
            copyBtn.textContent = "コピーした";
            setTimeout(function () { copyBtn.textContent = "コピー"; }, 1500);
          });
        });
        inviteRow.appendChild(urlInput);
        inviteRow.appendChild(copyBtn);
        listEl.appendChild(inviteRow);
      }

      var reachRow = document.createElement("div");
      reachRow.className = "reach-row";
      var reachLabel = document.createElement("span");
      reachLabel.className = "reach-label";
      reachLabel.textContent = "影響範囲";
      reachRow.appendChild(reachLabel);

      // 明示的に決定（confirm）した後、または「完成」後は、発起人自身も含めて影響範囲を固定する
      // （色を見てから強さを調整できてしまうと、位置決め時点の関係性の感覚ではなく色への印象で結果を
      // 歪めてしまうため）。決定前（色を選んだだけの段階）はまだロックしない。
      if (locked) {
        var reachLocked = document.createElement("span");
        reachLocked.className = "reach-label";
        reachLocked.textContent = "固定済み（" + (p.reach || MeshRender.DEFAULT_REACH).toFixed(2) + "）";
        reachRow.appendChild(reachLocked);
      } else {
        var reachInput = document.createElement("input");
        reachInput.type = "range";
        reachInput.min = "0.08";
        reachInput.max = "0.95";
        reachInput.step = "0.01";
        reachInput.value = p.reach || MeshRender.DEFAULT_REACH;
        reachInput.addEventListener("input", function () {
          p.reach = parseFloat(reachInput.value);
          render();
        });
        reachInput.addEventListener("change", function () {
          apiPatch("/api/sessions/" + sessionId + "/participants/" + p.id, { reach: p.reach });
        });
        reachRow.appendChild(reachInput);
      }
      listEl.appendChild(reachRow);
    });
  }

  addBtn.addEventListener("click", function () {
    if (flow !== "idle" || completed) return;
    flow = "placing-friend";
    updateInstruction();
  });

  completeBtn.addEventListener("click", function () {
    if (completed || flow !== "idle") return;
    var self = points.filter(function (p) { return p.isSelf; })[0];
    if (!self || !self.color) {
      window.alert("先に自分の色を選んでください。");
      return;
    }
    var ok = window.confirm(
      "完成すると、これ以上友達を追加したり、色・位置・影響範囲を変更したりできなくなる。未回答の友達枠は" +
      "この時点で締め切られる。完成しますか？"
    );
    if (!ok) return;
    render(); // 送信直前の状態を確実にcanvasへ反映してからダウンロード用画像を生成する
    var dataUrl = canvas.toDataURL("image/png");
    completeBtn.disabled = true;
    apiPost("/api/sessions/" + sessionId + "/complete", { dataUrl: dataUrl }).then(function (res) {
      if (res && res.completedAt) {
        // res.finalArtDataUrlはサーバーに保存された値（既に他タブ等で完成済みだった場合はそちらが正）。
        // 通常の初回成功時はここに今生成したdataUrlがそのまま反映されて返る。
        completed = true;
        finalArtDataUrl = res.finalArtDataUrl || dataUrl;
        updateInstruction();
        applyCompletedState();
        renderList();
        render();
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      } else {
        completeBtn.disabled = false;
        window.alert("完成に失敗した。" + (res && res.error ? res.error : ""));
      }
    }).catch(function () {
      completeBtn.disabled = false;
      window.alert("完成に失敗した（通信エラー）。もう一度試してください。");
    });
  });

  var btnNaive = document.getElementById("modeNaive");
  var btnPerceptual = document.getElementById("modePerceptual");
  function setBlendMode(m) {
    blendMode = m;
    btnNaive.classList.toggle("active", m === "naive");
    btnPerceptual.classList.toggle("active", m === "perceptual");
    render();
  }
  btnNaive.addEventListener("click", function () { setBlendMode("naive"); });
  btnPerceptual.addEventListener("click", function () { setBlendMode("perceptual"); });

  canvas.addEventListener("pointerdown", function (e) {
    var u = canvasPosToUnit(e.clientX, e.clientY);
    if (flow === "placing-self") { placeSelf(u); return; }
    if (flow === "placing-friend") { placeFriend(u); return; }
    if (flow !== "idle" || completed) return;

    // 明示的に決定（confirm）した点は、発起人自身も含めてドラッグ対象から外す（色を見てから位置を
    // 動かせてしまうバイアスを防ぐため。reach・colorのロックと同条件）
    var closest = null, closestDist = Infinity;
    points.forEach(function (p) {
      if (p.respondedAt) return;
      var d = Math.hypot(p.x - u.x, p.y - u.y);
      if (d < closestDist) { closestDist = d; closest = p; }
    });
    if (closest && closestDist < 0.12) {
      dragging = closest;
      canvas.style.cursor = "grabbing";
    }
  });
  window.addEventListener("pointermove", function (e) {
    if (!dragging) return;
    var u = canvasPosToUnit(e.clientX, e.clientY);
    dragging.x = u.x;
    dragging.y = u.y;
    renderList();
    render();
  });
  window.addEventListener("pointerup", function () {
    if (dragging) {
      apiPatch("/api/sessions/" + sessionId + "/participants/" + dragging.id, { x: dragging.x, y: dragging.y });
    }
    dragging = null;
    canvas.style.cursor = "grab";
  });

  // 保存されていたセッションIDがある前提で起動を試み、サーバー側にそのデータが無かった場合の復旧
  function startFresh() {
    localStorage.removeItem(LS_SESSION);
    localStorage.removeItem(LS_SELF);
    sessionId = null;
    selfId = null;
    points = [];
    flow = "placing-self";
    updateInstruction();
    renderList();
    render();
  }

  // ---- 起動: 既存セッションがあれば復元、なければ自分の配置から開始 ----
  function boot() {
    if (sessionId) {
      apiGet("/api/sessions/" + sessionId).then(function (res) {
        if (!res || !res.participants) {
          // ブラウザに残っていたセッションIDが、サーバー側には存在しない
          // （データをリセットした／別のサーバーインスタンスを指している等）。
          // このまま進めると自分の位置すら選べない詰み状態になるため、新規セッションとして復旧する。
          startFresh();
          return;
        }
        points = res.participants;
        var self = points.filter(function (p) { return p.isSelf; })[0];
        pendingSelf = self && !self.color ? self : null;
        flow = pendingSelf ? "awaiting-self-color" : "idle";
        nextFriendNum = points.length; // ラベルの重複を避けるための簡易カウンタ
        if (res.completedAt) {
          completed = true;
          finalArtDataUrl = res.finalArtDataUrl || null;
        }
        updateInstruction();
        applyCompletedState();
        renderList();
        render();
        // 完成済みセッションは以後変化しないため、ポーリングを開始する必要がない
        if (!completed) startPolling();
      }).catch(startFresh);
    } else {
      updateInstruction();
      renderList();
      render();
    }
  }
  boot();
})();
</script>
</body>
</html>
